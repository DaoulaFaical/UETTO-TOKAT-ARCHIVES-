<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - UETTO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 20px; padding: 2rem; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #1e3c72; font-size: 2rem; }
        .logo p { color: #666; }
        h2 { color: #1e3c72; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333; }
        input { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: none; border-color: #764ba2; }
        button { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.3s; }
        button:hover { transform: translateY(-2px); }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #764ba2; text-decoration: none; }
        .error { color: red; margin-bottom: 1rem; text-align: center; }
        .success { color: green; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>UETTO</h1>
            <p>Union des Étudiants Tchadiens à Tokat</p>
        </div>
        <h2>📝 Créer mon compte</h2>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="fullname" required placeholder="Ex: Ali Moussa">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="exemple@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required placeholder="Au moins 6 caractères">
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">✅ S'inscrire</button>
        </form>
        <div class="link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

       const firebaseConfig = {
    apiKey: "AIzaSyBJvIKoK8ffLsOroCDM_jtW0nzB9CNnQmQ",
    authDomain: "uetto-tokat.firebaseapp.com",
    databaseURL: "https://uetto-tokat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "uetto-tokat",
    storageBucket: "uetto-tokat.firebasestorage.app",
    messagingSenderId: "123574749707",
    appId: "1:123574749707:web:e50ddcaab587c4d8a0950e"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            document.getElementById('error').innerHTML = '';
            document.getElementById('success').innerHTML = '';

            if (password !== confirmPassword) {
                document.getElementById('error').innerHTML = '❌ Les mots de passe ne correspondent pas';
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: fullname });
                await set(ref(db, 'users/' + userCredential.user.uid), {
                    fullname: fullname,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                document.getElementById('success').innerHTML = '✅ Compte créé ! Redirection...';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    document.getElementById('error').innerHTML = '❌ Cet email est déjà utilisé';
                } else {
                    document.getElementById('error').innerHTML = '❌ Erreur : ' + error.message;
                }
            }
        });
    </script>
</body>
</html>
