<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contribuer - UETTO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; }
        .logo-container { display: flex; align-items: center; gap: 1.5rem; }
        .logo { width: 70px; height: 70px; object-fit: contain; border-radius: 50%; background: white; padding: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-text h1 { font-size: 1.8rem; color: #1e3c72; }
        .logo-text p { color: #666; font-size: 0.9rem; }
        nav { background: #1e3c72; padding: 0.8rem 2rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        nav a { color: white; text-decoration: none; padding: 0.6rem 1.5rem; border-radius: 30px; font-weight: 500; transition: all 0.3s; }
        nav a:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        section { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #1e3c72; margin-bottom: 1.5rem; font-size: 1.8rem; border-left: 5px solid #764ba2; padding-left: 1rem; }
        .alert { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #1e3c72; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 12px; font-family: inherit; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #764ba2; }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.8rem 2rem; border: none; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: transform 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); }
        footer { background: #1a1a2e; color: white; text-align: center; padding: 2rem; margin-top: 3rem; }
        @media (max-width: 768px) { .logo-container { flex-direction: column; text-align: center; } nav a { padding: 0.4rem 1rem; font-size: 0.9rem; } main { padding: 0 1rem; } section { padding: 1.2rem; } }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="../logo-uetto.png" alt="Logo UETTO" class="logo" onerror="this.src='https://placehold.co/80x80?text=UETTO'">
                <div class="logo-text">
                    <h1>UETTO</h1>
                    <p>Contribuez à la communauté</p>
                </div>
            </div>
        </div>
        <nav>
            <a href="../index.html">🏠 Accueil</a>
            <a href="cours.html">📚 Cours</a>
            <a href="annales.html">📝 Annales</a>
            <a href="admin.html">📋 Démarches</a>
            <a href="contribute.html">🤝 Contribuer</a>
        </nav>
    </header>
    <main>
        <h2>🤝 Partager un document</h2>
        
        <div class="alert">
            📧 Envoyez vos documents par email à : <strong>uetto.tokat@gmail.com</strong>
        </div>
        
        <form>
            <div class="form-group">
                <label>Votre nom complet</label>
                <input type="text" placeholder="Ex: Ali Moussa" required>
            </div>
            
            <div class="form-group">
                <label>Votre email</label>
                <input type="email" placeholder="exemple@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Type de document</label>
                <select required>
                    <option value="">Sélectionnez</option>
                    <option>Cours</option>
                    <option>Annales / Examen</option>
                    <option>Démarche administrative</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Titre du document</label>
                <input type="text" placeholder="Ex: Cours de Mathématiques Semestre 1" required>
            </div>
            
            <div class="form-group">
                <label>Description (optionnel)</label>
                <textarea rows="3" placeholder="Décrivez brièvement le contenu..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">📤 Envoyer ma contribution</button>
        </form>
    </main>
    <footer>
        <p>UETTO - Union des Étudiants Tchadiens à Tokat</p>
    </footer>
</body>
</html>
