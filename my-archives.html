<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes archives - UETTO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 1rem 2rem; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo-container { display: flex; align-items: center; gap: 1rem; }
        .logo { width: 50px; height: 50px; border-radius: 50%; background: white; padding: 5px; }
        .logo-text h1 { font-size: 1.5rem; color: #1e3c72; }
        nav a { color: #1e3c72; text-decoration: none; margin: 0 0.5rem; padding: 0.5rem 1rem; border-radius: 20px; transition: 0.3s; }
        nav a:hover { background: #667eea; color: white; }
        .logout-btn { background: #f5576c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; }
        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        h2 { color: #1e3c72; margin-bottom: 1.5rem; border-left: 5px solid #764ba2; padding-left: 1rem; }
        .document-card { background: white; border-radius: 15px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 4px solid #764ba2; }
        .document-card h3 { color: #1e3c72; margin-bottom: 0.5rem; }
        .document-card p { color: #666; margin: 0.3rem 0; }
        .badge { display: inline-block; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; margin-right: 0.5rem; }
        .badge-cours { background: #667eea; color: white; }
        .badge-annales { background: #f093fb; color: white; }
        .badge-admin { background: #f5576c; color: white; }
        .download-link { color: #764ba2; text-decoration: none; font-weight: bold; }
        .empty { text-align: center; padding: 3rem; background: white; border-radius: 20px; color: #666; }
        footer { background: #1a1a2e; color: white; text-align: center; padding: 2rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="logo-uetto.png" class="logo" alt="Logo" onerror="this.src='https://placehold.co/50x50?text=UETTO'">
                <div class="logo-text"><h1>UETTO</h1></div>
            </div>
            <nav>
                <a href="index.html">🏠 Accueil</a>
                <a href="add-document.html">➕ Ajouter</a>
                <a href="my-archives.html">📁 Mes archives</a>
                <button id="logoutBtn" class="logout-btn">🚪 Déconnexion</button>
            </nav>
        </div>
    </header>
    <main>
        <h2>📁 Mes archives personnelles</h2>
        <div id="documentsList">Chargement...</div>
    </main>
    <footer>
        <p>UETTO - Union des Étudiants Tchadiens à Tokat</p>
        <p>© 2026 - Tous droits réservés</p>
    </footer>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_AUTH_DOMAIN",
            databaseURL: "VOTRE_DATABASE_URL",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_STORAGE_BUCKET",
            messagingSenderId: "VOTRE_MESSAGING_ID",
            appId: "VOTRE_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            
            const documentsRef = ref(db, 'documents');
            onValue(documentsRef, (snapshot) => {
                const docs = snapshot.val();
                const container = document.getElementById('documentsList');
                
                if (!docs) {
                    container.innerHTML = '<div class="empty">📭 Vous n\'avez pas encore ajouté de documents. <a href="add-document.html">Ajoutez votre premier document →</a></div>';
                    return;
                }
                
                const userDocs = Object.entries(docs).filter(([id, data]) => data.userId === user.uid);
                
                if (userDocs.length === 0) {
                    container.innerHTML = '<div class="empty">📭 Vous n\'avez pas encore ajouté de documents. <a href="add-document.html">Ajoutez votre premier document →</a></div>';
                    return;
                }
                
                let html = '';
                userDocs.forEach(([id, data]) => {
                    let badgeClass = 'badge-cours';
                    let typeLabel = '📚 Cours';
                    if (data.type === 'annales') { badgeClass = 'badge-annales'; typeLabel = '📝 Annales'; }
                    if (data.type === 'admin') { badgeClass = 'badge-admin'; typeLabel = '📋 Administratif'; }
                    
                    html += `
                        <div class="document-card">
                            <span class="badge ${badgeClass}">${typeLabel}</span>
                            <h3>${data.title}</h3>
                            ${data.subject ? `<p>📖 ${data.subject}</p>` : ''}
                            ${data.description ? `<p>${data.description}</p>` : ''}
                            <p><small>📅 Ajouté le ${new Date(data.createdAt).toLocaleDateString('fr-FR')}</small></p>
                            ${data.fileLink ? `<a href="${data.fileLink}" target="_blank" class="download-link">📥 Télécharger le document</a>` : '<p class="download-link">⚠️ Lien non disponible</p>'}
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
